<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#1c1208" />
<title>우드 블록 퀘스트</title>
<style>
  :root{
    --cell: 44px;
    --traycell: 27px;
    --wood-dark:#4a3017;
    --wood:#6b4626;
    --wood-light:#8a5e36;
    --bg-grad-1:#3a2814;
    --bg-grad-2:#1c1208;
    --text-main:#f3e3c8;
    --text-accent:#f6d486;
    --text-sub:#c79a5a;
    --gold:#ffd24a;
    --board-grad-1:#5a3c22;
    --board-grad-2:#3d2814;
    --slot-grad-1:#6b4626;
    --slot-grad-2:#3d2814;
    --hole-grad-1:#7a5836;
    --hole-grad-2:#5e4126;
    --frame-stripe: rgba(0,0,0,.10);
  }
  /* Theme: Neon */
  body.theme-neon{
    --wood-dark:#1a1530;
    --wood:#2a1f55;
    --wood-light:#3d2d80;
    --bg-grad-1:#1a0d3d;
    --bg-grad-2:#06031a;
    --text-main:#e0d4ff;
    --text-accent:#7df9ff;
    --text-sub:#a98aff;
    --gold:#ff5ed4;
    --board-grad-1:#1f1542;
    --board-grad-2:#0c0825;
    --slot-grad-1:#2a1f55;
    --slot-grad-2:#16104a;
    --hole-grad-1:#2e2370;
    --hole-grad-2:#1a1450;
    --frame-stripe: rgba(125,249,255,.08);
  }
  /* Theme: Crystal */
  body.theme-crystal{
    --wood-dark:#1a3a4a;
    --wood:#2e5a72;
    --wood-light:#4f87a8;
    --bg-grad-1:#0e2a3a;
    --bg-grad-2:#04141d;
    --text-main:#e8f4ff;
    --text-accent:#a0e8ff;
    --text-sub:#6cb4d0;
    --gold:#ffd24a;
    --board-grad-1:#1b3f55;
    --board-grad-2:#0a1f2d;
    --slot-grad-1:#2e5a72;
    --slot-grad-2:#15384c;
    --hole-grad-1:#3f6e88;
    --hole-grad-2:#244d62;
    --frame-stripe: rgba(160,232,255,.08);
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(ellipse at 50% 0%, var(--bg-grad-1) 0%, var(--bg-grad-2) 70%);
    color:var(--text-main);
    display:flex; flex-direction:column; align-items:center;
    min-height:100%;
    padding:14px 10px 24px;
    padding-top: max(14px, env(safe-area-inset-top));
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    overflow:hidden;
    user-select:none; -webkit-user-select:none;
    touch-action: manipulation;
    overscroll-behavior: none;
    transition: background .4s ease;
  }

  /* ---------- header ---------- */
  .topbar{
    width:100%; max-width:480px;
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:10px;
    gap:6px;
  }
  .title{
    font-size:19px; font-weight:800; letter-spacing:.5px;
    color:var(--text-accent);
    text-shadow:0 2px 0 #5c3c1f, 0 3px 6px rgba(0,0,0,.6);
    flex-shrink: 0;
  }
  .title small{ display:block; font-size:9px; letter-spacing:2.5px; color:var(--text-sub); font-weight:600;}
  .iconbtn{
    width:36px; height:36px; border:none; border-radius:11px;
    background:linear-gradient(160deg,var(--wood-light),var(--wood-dark));
    color:var(--text-accent); font-size:16px; cursor:pointer;
    box-shadow:0 3px 0 #3a2510, inset 0 1px 1px rgba(255,255,255,.25);
    display:flex; align-items:center; justify-content:center;
    transition:transform .08s;
    flex-shrink:0;
  }
  .iconbtn:active{ transform:translateY(2px); box-shadow:0 1px 0 #3a2510; }
  .iconbtn.alert{
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow:0 3px 0 #3a2510, inset 0 1px 1px rgba(255,255,255,.25), 0 0 0 0 rgba(255,210,74,.7); }
    50%{ box-shadow:0 3px 0 #3a2510, inset 0 1px 1px rgba(255,255,255,.25), 0 0 0 6px rgba(255,210,74,0); }
  }
  .btnrow{ display:flex; gap:6px; }

  /* coin badge */
  .coinbox{
    display:flex; align-items:center; gap:4px;
    padding:5px 9px;
    background:linear-gradient(160deg,#6b4626,#3d2814);
    border-radius:11px;
    box-shadow:inset 0 1px 2px rgba(255,255,255,.15);
    font-weight:800; font-size:13px;
    color:var(--gold);
    flex-shrink:0;
  }
  .coinbox .icon{ font-size:14px; }

  /* ---------- score panel ---------- */
  .scorewrap{
    width:100%; max-width:480px;
    display:flex; gap:8px; margin-bottom:10px;
  }
  .scorecard{
    flex:1; background:linear-gradient(160deg,var(--wood),var(--wood-dark));
    border-radius:12px; padding:7px 10px;
    box-shadow:inset 0 1px 2px rgba(255,255,255,.18), 0 3px 6px rgba(0,0,0,.45);
    text-align:center;
  }
  .scorecard .lbl{ font-size:9px; letter-spacing:1.5px; color:var(--text-sub); font-weight:700; }
  .scorecard .val{ font-size:21px; font-weight:800; color:var(--text-accent); line-height:1.15; }
  .scorecard.combo .val{ color:var(--gold); }

  .modebar{
    width:100%; max-width:480px;
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:8px;
    font-size:11px; color:var(--text-sub);
    font-weight:700;
    letter-spacing:1px;
  }
  .modebar .modename{ color:var(--text-accent); }
  .modebar .objective{ font-size:11px; }
  .modebar .objective b{ color:var(--gold); font-weight:800; }

  /* ---------- frame & board ---------- */
  .frame{
    background:
      repeating-linear-gradient(91deg, var(--frame-stripe) 0 3px, transparent 3px 9px),
      linear-gradient(160deg,var(--wood-light),var(--wood-dark));
    padding:14px;
    border-radius:20px;
    box-shadow:
      inset 0 2px 3px rgba(255,255,255,.22),
      inset 0 -6px 12px rgba(0,0,0,.45),
      0 12px 28px rgba(0,0,0,.6);
    border:3px solid #2e1d0c;
    position:relative;
  }
  .frame.shake{ animation:shake .4s ease; }
  @keyframes shake{
    0%,100%{transform:translate(0,0);}
    20%{transform:translate(-5px,3px) rotate(-.5deg);}
    40%{transform:translate(5px,-3px) rotate(.5deg);}
    60%{transform:translate(-4px,2px);}
    80%{transform:translate(4px,-2px);}
  }
  .board{
    position:relative;
    display:grid;
    grid-template-columns:repeat(8,var(--cell));
    grid-template-rows:repeat(8,var(--cell));
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.13) 0 2px, transparent 2px 8px),
      linear-gradient(160deg,var(--board-grad-1),var(--board-grad-2));
    border-radius:10px;
    box-shadow:inset 0 3px 10px rgba(0,0,0,.6);
    touch-action: none;
  }
  .cell{ position:relative; width:var(--cell); height:var(--cell); }
  .cell::before{
    content:""; position:absolute; inset:7%;
    border-radius:22%;
    background:linear-gradient(160deg,var(--hole-grad-1),var(--hole-grad-2));
    box-shadow:inset 0 2px 4px rgba(0,0,0,.5), inset 0 -2px 3px rgba(255,255,255,.07);
  }
  .cell.ghost::after{
    content:""; position:absolute; inset:7%;
    border-radius:22%;
    background:var(--c);
    opacity:.4;
  }
  .cell.ghost.gline::after{
    opacity:.7;
    box-shadow:0 0 8px 2px rgba(255,255,255,.7);
  }
  .cell.hint-glow::before{
    animation: hintglow 1.2s ease infinite;
  }
  @keyframes hintglow{
    0%,100%{ box-shadow:inset 0 2px 4px rgba(0,0,0,.5), 0 0 0 0 rgba(255,210,74,0); }
    50%{ box-shadow:inset 0 2px 4px rgba(0,0,0,.5), 0 0 12px 3px rgba(255,210,74,.7); }
  }

  .blk{
    position:absolute; inset:7%;
    border-radius:22%;
    display:none;
    background:
      linear-gradient(150deg,
        color-mix(in srgb, var(--c) 60%, #ffffff) 0%,
        var(--c) 48%,
        color-mix(in srgb, var(--c) 72%, #000000) 100%);
    box-shadow:
      inset 0 0.16em 0.12em rgba(255,255,255,.6),
      inset 0 -0.2em 0.16em rgba(0,0,0,.4),
      inset 0.14em 0 0.1em rgba(255,255,255,.25),
      0 0.1em 0.16em rgba(0,0,0,.4);
  }
  .blk::after{
    content:""; position:absolute; left:16%; top:12%;
    width:34%; height:26%;
    border-radius:50%;
    background:rgba(255,255,255,.4);
    filter:blur(1px);
  }
  .cell.filled .blk{ display:block; }
  .cell.pop .blk{ animation:pop .22s ease; }
  @keyframes pop{
    0%{ transform:scale(.4); }
    65%{ transform:scale(1.12); }
    100%{ transform:scale(1); }
  }
  .cell.clearing .blk{ animation:clearpop .34s ease forwards; }
  @keyframes clearpop{
    0%{ transform:scale(1); filter:brightness(1); }
    35%{ transform:scale(1.22); filter:brightness(2.4); }
    100%{ transform:scale(0); filter:brightness(3); opacity:0; }
  }

  /* Special block markers */
  .blk .special{
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    font-size:0.7em; pointer-events:none;
    text-shadow:0 1px 2px rgba(0,0,0,.7);
  }
  .blk.rainbow{
    background:
      conic-gradient(from 0deg,
        #e8463d, #ee8f2f, #f1c12e, #54bd45, #27b8c8, #3f7ad9, #a45ad0, #e8463d);
    animation:spinbg 3s linear infinite;
  }
  @keyframes spinbg{
    from{filter:hue-rotate(0deg);} to{filter:hue-rotate(360deg);}
  }
  .blk.golden{
    background:
      linear-gradient(150deg, #fff5b0 0%, #ffd24a 48%, #b07a00 100%);
  }

  /* ---------- tray ---------- */
  .tray{
    width:100%; max-width:480px;
    margin-top:14px;
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:8px;
    touch-action: none;
  }
  .slot{
    height:calc(var(--traycell) * 4.4);
    background:linear-gradient(160deg,var(--slot-grad-1),var(--slot-grad-2));
    border-radius:14px;
    box-shadow:inset 0 2px 5px rgba(0,0,0,.5), 0 3px 5px rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .slot .piece{ position:relative; }
  .slot.dragging .piece{ opacity:.25; }
  .slot .piece .blk{ display:block; }
  .slot .piece.spin{ animation:spin .26s ease; }
  @keyframes spin{
    0%{ transform:rotate(-90deg) scale(.65); }
    60%{ transform:rotate(9deg) scale(1.1); }
    100%{ transform:rotate(0deg) scale(1); }
  }

  /* ---------- booster bar ---------- */
  .boosterbar{
    width:100%; max-width:480px;
    display:flex; justify-content:space-around;
    margin-top:10px;
    padding:6px 8px;
    background:linear-gradient(160deg, rgba(0,0,0,.3), rgba(0,0,0,.5));
    border-radius:14px;
    box-shadow:inset 0 1px 2px rgba(255,255,255,.08);
  }
  .booster{
    width:48px; height:48px;
    border:none; border-radius:11px;
    background:linear-gradient(160deg,var(--wood-light),var(--wood-dark));
    color:var(--text-accent);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer;
    position:relative;
    box-shadow:0 2px 0 #3a2510, inset 0 1px 1px rgba(255,255,255,.2);
    transition:transform .08s;
    font-size:11px; font-weight:800;
  }
  .booster:active{ transform:translateY(2px); box-shadow:0 0 0 #3a2510; }
  .booster .bicon{ font-size:18px; line-height:1; margin-bottom:1px; }
  .booster .bcount{
    position:absolute; top:-3px; right:-3px;
    background:var(--gold); color:#3a2510;
    font-size:10px; font-weight:900;
    min-width:16px; height:16px; padding:0 3px;
    border-radius:8px;
    line-height:16px;
    box-shadow:0 1px 2px rgba(0,0,0,.5);
  }
  .booster.active{
    background:linear-gradient(160deg, var(--gold), #c08020);
    color:#3a2510;
    box-shadow:0 0 0 2px var(--gold), 0 2px 0 #3a2510;
  }
  .booster:disabled{
    opacity:.4; cursor:default;
  }

  /* ---------- floating drag piece ---------- */
  .floating{
    position:fixed; z-index:50; pointer-events:none;
    left:0; top:0;
    filter:drop-shadow(0 8px 10px rgba(0,0,0,.55));
  }
  .floating .blk{ display:block; }

  /* ---------- particles ---------- */
  .particle{
    position:fixed; z-index:60; pointer-events:none;
    width:9px; height:9px; border-radius:3px;
    animation:fly .6s ease-out forwards;
  }
  @keyframes fly{
    0%{ transform:translate(-50%,-50%) scale(1.2); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.2); opacity:0; }
  }

  /* ---------- floating texts ---------- */
  .scorepop{
    position:fixed; z-index:60; pointer-events:none;
    font-weight:800; font-size:20px; color:#ffe070;
    text-shadow:0 2px 4px rgba(0,0,0,.7);
    animation:rise .9s ease-out forwards;
  }
  @keyframes rise{
    0%{ transform:translate(-50%,0) scale(.6); opacity:0; }
    20%{ transform:translate(-50%,-10px) scale(1.1); opacity:1; }
    100%{ transform:translate(-50%,-70px) scale(1); opacity:0; }
  }
  .combobanner{
    position:fixed; z-index:61; pointer-events:none;
    left:50%; top:38%;
    transform:translate(-50%,-50%);
    font-weight:900; font-size:42px;
    color:var(--gold);
    text-shadow:0 0 18px rgba(255,170,40,.9), 0 4px 6px rgba(0,0,0,.7);
    animation:combo .9s ease-out forwards;
  }
  .combobanner.special{
    font-size:54px;
    background:linear-gradient(90deg,#e8463d,#ee8f2f,#f1c12e,#54bd45,#27b8c8,#3f7ad9,#a45ad0);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:transparent;
    text-shadow:none;
    filter:drop-shadow(0 0 16px rgba(255,220,120,.85)) drop-shadow(0 4px 5px rgba(0,0,0,.65));
    animation:combo 1.3s ease-out forwards;
  }
  @keyframes combo{
    0%{ transform:translate(-50%,-50%) scale(.3) rotate(-12deg); opacity:0; }
    25%{ transform:translate(-50%,-50%) scale(1.15) rotate(4deg); opacity:1; }
    70%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
    100%{ transform:translate(-50%,-115%) scale(.9); opacity:0; }
  }

  /* ---------- achievement toast ---------- */
  .toast{
    position:fixed; z-index:70;
    left:50%; top:20px;
    transform:translate(-50%, -100%);
    background:linear-gradient(160deg, var(--gold), #c08020);
    color:#3a2510;
    padding:10px 18px;
    border-radius:13px;
    font-weight:800;
    box-shadow:0 8px 20px rgba(0,0,0,.5);
    display:flex; align-items:center; gap:10px;
    pointer-events:none;
    animation:toastin 3.5s ease forwards;
    max-width: 90vw;
  }
  @keyframes toastin{
    0%{ transform:translate(-50%, -100%); }
    10%{ transform:translate(-50%, 0); }
    85%{ transform:translate(-50%, 0); }
    100%{ transform:translate(-50%, -100%); }
  }
  .toast .ticon{ font-size:24px; }
  .toast .ttitle{ font-size:11px; color:#5c3c1f; letter-spacing:1.5px; }
  .toast .tbody{ font-size:14px; }

  /* ---------- modal common ---------- */
  .overlay{
    position:fixed; inset:0; z-index:80;
    background:rgba(10,6,2,.78);
    display:none; align-items:center; justify-content:center;
    backdrop-filter:blur(3px);
    padding:20px;
  }
  .overlay.show{ display:flex; animation:fade .25s ease; }
  @keyframes fade{ from{opacity:0;} to{opacity:1;} }
  .modal{
    background:
      repeating-linear-gradient(91deg, rgba(0,0,0,.08) 0 3px, transparent 3px 9px),
      linear-gradient(160deg,var(--wood-light),var(--wood-dark));
    border:3px solid #2e1d0c;
    border-radius:22px;
    padding:24px 26px;
    text-align:center;
    box-shadow:0 18px 40px rgba(0,0,0,.7), inset 0 2px 3px rgba(255,255,255,.2);
    animation:popin .3s ease;
    max-width:340px;
    width:100%;
    max-height:90vh;
    overflow-y:auto;
  }
  @keyframes popin{ from{transform:scale(.7);opacity:0;} to{transform:scale(1);opacity:1;} }
  .modal h2{ font-size:24px; color:var(--text-accent); margin-bottom:6px; }
  .modal .sub{ font-size:12px; color:var(--text-sub); margin-bottom:14px; }
  .modal .finalscore{ font-size:42px; font-weight:900; color:var(--gold);
    text-shadow:0 2px 6px rgba(0,0,0,.6); line-height:1; }
  .modal .best{ font-size:12px; color:#e0bd84; margin:8px 0 16px; }
  .bigbtn{
    border:none; cursor:pointer;
    background:linear-gradient(160deg,var(--gold),#e09020);
    color:#3a2510; font-weight:800; font-size:16px;
    padding:11px 26px; border-radius:13px;
    box-shadow:0 4px 0 #9c6010, inset 0 1px 1px rgba(255,255,255,.5);
    transition:transform .08s;
    margin: 4px;
  }
  .bigbtn:active{ transform:translateY(3px); box-shadow:0 1px 0 #9c6010; }
  .bigbtn.secondary{
    background:linear-gradient(160deg,var(--wood-light),var(--wood-dark));
    color:var(--text-accent);
    box-shadow:0 4px 0 #3a2510, inset 0 1px 1px rgba(255,255,255,.2);
  }
  .bigbtn.secondary:active{ box-shadow:0 1px 0 #3a2510; }

  /* main menu */
  .menu-modes{
    display:flex; flex-direction:column; gap:8px;
    margin:14px 0;
  }
  .menu-mode{
    display:flex; align-items:center; gap:12px;
    padding:11px 14px;
    background:linear-gradient(160deg, rgba(0,0,0,.25), rgba(0,0,0,.45));
    border-radius:12px;
    cursor:pointer;
    border: 2px solid transparent;
    transition: border-color .15s;
    text-align:left;
    width:100%;
    color:var(--text-main);
    font-family:inherit;
  }
  .menu-mode:active{ border-color: var(--gold); }
  .menu-mode .mode-icon{ font-size:28px; }
  .menu-mode .mode-name{ font-weight:800; font-size:15px; color:var(--text-accent); }
  .menu-mode .mode-desc{ font-size:11px; color:var(--text-sub); }
  .menu-mode .badge{
    margin-left:auto;
    background:var(--gold); color:#3a2510;
    padding:2px 8px; border-radius:8px;
    font-size:10px; font-weight:900;
  }
  .menu-mode.locked{ opacity:.5; }
  .menu-mode.locked .badge{ background:#999; color:#444; }

  .menu-foot{
    display:flex; justify-content:center; gap:8px;
    margin-top:10px;
  }
  .menu-foot .iconbtn{
    width:42px; height:42px; font-size:18px;
  }

  /* stats grid */
  .stats-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:8px;
    margin:14px 0;
  }
  .stat-cell{
    background:linear-gradient(160deg, rgba(0,0,0,.25), rgba(0,0,0,.45));
    padding:8px 10px; border-radius:10px;
    text-align:left;
  }
  .stat-cell .lbl{ font-size:10px; color:var(--text-sub); letter-spacing:1px; font-weight:700; }
  .stat-cell .val{ font-size:18px; font-weight:800; color:var(--text-accent); }
  .shop-cell{
    background:linear-gradient(160deg, rgba(0,0,0,.3), rgba(0,0,0,.5));
    padding:10px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .08s, border-color .15s;
  }
  .shop-cell:active{ transform:translateY(2px); border-color: var(--gold); }
  .shop-cell.cant-afford{ opacity:.5; cursor:not-allowed; }
  .shop-cell .icon{ font-size:28px; }
  .shop-cell .nm{ font-size:12px; font-weight:800; color:var(--text-accent); margin-top:2px; }
  .shop-cell .price{
    font-size:12px; font-weight:900; color:var(--gold);
    background: rgba(0,0,0,.3);
    border-radius:10px;
    padding:3px 8px;
    margin-top:6px; display:inline-block;
  }
  .shop-cell .qty{ font-size:11px; color:var(--text-sub); }

  /* settings */
  .setting-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:9px 4px;
    border-bottom: 1px solid rgba(0,0,0,.3);
  }
  .setting-row:last-child{ border-bottom:none; }
  .setting-row .lbl{ font-size:13px; color:var(--text-main); font-weight:600; }
  .theme-picker{ display:flex; gap:6px; }
  .theme-chip{
    width:34px; height:34px; border-radius:50%;
    border:2px solid rgba(255,255,255,.2);
    cursor:pointer;
    transition: transform .1s;
  }
  .theme-chip.selected{ border-color: var(--gold); transform:scale(1.1); }
  .theme-chip[data-theme="classic"]{ background:radial-gradient(circle, #8a5e36, #3a2814); }
  .theme-chip[data-theme="neon"]{ background:radial-gradient(circle, #3d2d80, #06031a); }
  .theme-chip[data-theme="crystal"]{ background:radial-gradient(circle, #4f87a8, #04141d); }
  .toggle{
    width:44px; height:24px; border-radius:12px;
    background:#5c3c1f; position:relative; cursor:pointer;
    transition: background .2s;
  }
  .toggle::after{
    content:""; position:absolute; top:2px; left:2px;
    width:20px; height:20px; border-radius:50%;
    background:var(--text-accent);
    transition: left .2s;
  }
  .toggle.on{ background: var(--gold); }
  .toggle.on::after{ left:22px; }

  /* achievements list */
  .ach-list{
    display:flex; flex-direction:column; gap:6px;
    max-height:60vh; overflow-y:auto;
    margin: 10px 0;
    text-align:left;
  }
  .ach-row{
    display:flex; align-items:center; gap:10px;
    padding:8px 10px;
    background:linear-gradient(160deg, rgba(0,0,0,.2), rgba(0,0,0,.4));
    border-radius:10px;
  }
  .ach-row.done{
    background:linear-gradient(160deg, rgba(255,210,74,.2), rgba(255,210,74,.05));
  }
  .ach-icon{ font-size:22px; filter:grayscale(1) opacity(.4); }
  .ach-row.done .ach-icon{ filter:none; }
  .ach-info{ flex:1; min-width:0; }
  .ach-info .nm{ font-size:13px; font-weight:800; color:var(--text-accent); }
  .ach-info .ds{ font-size:11px; color:var(--text-sub); }
  .ach-row.done .ach-info .ds{ color: var(--gold); }

  /* tutorial */
  .tut-overlay{
    position:fixed; inset:0; z-index:90;
    background:rgba(10,6,2,.85);
    display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:20px;
  }
  .tut-overlay.show{ display:flex; animation:fade .25s ease; }
  .tut-card{
    max-width:360px;
    background: linear-gradient(160deg,var(--wood-light),var(--wood-dark));
    border:3px solid #2e1d0c;
    border-radius:18px;
    padding:20px 22px;
    text-align:center;
  }
  .tut-card .step{ font-size:11px; color:var(--text-sub); letter-spacing:2px; font-weight:700; }
  .tut-card h3{ font-size:20px; color:var(--text-accent); margin:6px 0 10px; }
  .tut-card p{ font-size:13px; color:var(--text-main); line-height:1.5; margin-bottom:14px; }

  /* hint */
  .hint{ margin-top:12px; font-size:11px; color:#9c7d52; text-align:center; }

  /* tray attention pulse for new pieces */
  .slot.new-piece{
    animation: slotpulse 0.6s ease 2;
  }
  @keyframes slotpulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); box-shadow:0 0 0 3px var(--gold), inset 0 2px 5px rgba(0,0,0,.5); }
  }

  /* timer bar for time attack */
  .timerbar{
    width:100%; max-width:480px;
    height:6px;
    background:rgba(0,0,0,.45);
    border-radius:3px;
    overflow:hidden;
    margin-bottom:8px;
    display:none;
  }
  .timerbar.active{ display:block; }
  .timerbar .fill{
    height:100%;
    background:linear-gradient(90deg, #54bd45, var(--gold), #e8463d);
    transition: width 0.1s linear;
    width:100%;
  }

  /* daily streak */
  .streak{
    display:flex; gap:6px; justify-content:center;
    margin: 12px 0;
  }
  .streak-day{
    flex:1; min-width:0;
    background:linear-gradient(160deg, rgba(0,0,0,.3), rgba(0,0,0,.5));
    border-radius:8px;
    padding:6px 4px;
    text-align:center;
    font-size:10px;
  }
  .streak-day.claimed{
    background:linear-gradient(160deg, rgba(84,189,69,.4), rgba(84,189,69,.2));
  }
  .streak-day.today{
    background:linear-gradient(160deg, var(--gold), #c08020);
    color:#3a2510;
    box-shadow:0 0 12px rgba(255,210,74,.5);
  }
  .streak-day .d{ font-weight:800; }
  .streak-day .r{ font-size:11px; font-weight:900; }
</style>
</head>
